<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    animation: pageFade 0.8s ease-in;
}

/* Smooth page load */
@keyframes pageFade {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Smooth sections */
.section {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.section:hover {
    transform: translateY(-3px);
}

/* Smooth image */
.cover {
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.cover:hover {
    transform: scale(1.04);
}

/* Smooth nav */
nav a {
    transition: color 0.3s ease, opacity 0.3s ease;
}
    body {
    font-family: Georgia, serif;
    margin: 0;
    color: white;
    text-align: center;
    background: radial-gradient(circle at top, #1b2a4a 0%, #0b1020 40%, #05070f 100%);
    background-attachment: fixed;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
    color: #facc15;
}

/* BOOK CARD */
.book {
    max-width: 750px;
    margin: 60px auto;
    padding: 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
}

.cover {
    width: 250px;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    transition: transform 0.3s ease;
}

.cover:hover {
    transform: scale(1.03);
}

.title {
    font-size: 1.6rem;
    margin-top: 15px;
    font-weight: bold;
}

.status {
    margin-top: 5px;
    color: #facc15;
    font-weight: bold;
}

.desc {
    margin-top: 15px;
    line-height: 1.8;
}

footer {
    margin-top: 60px;
    padding: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="books.html">Books</a>
</nav>

<h1>Books</h1>

<div class="book">

    <img src="a1d56683-d680-4d6a-82a9-de0e38b390bd.jpeg" class="cover">

    <div class="title">The Map To The Forgotten World</div>

    <div class="status">Debut Novel • Coming Soon</div>

    <div class="desc">
        A mysterious map leads to a forgotten world filled with hidden secrets, ancient mysteries,
        and a journey that changes everything it touches.
    </div>

</div>

<footer>
©️ 2026 Prashmit Mohapatra
</footer>

</body>
</html>
